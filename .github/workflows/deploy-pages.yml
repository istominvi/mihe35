name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          BASE_PATH: ""
          NEXT_PUBLIC_BASE_PATH: ""
        run: pnpm build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          cname: mihe35.ru

      - name: Show site URLs
        run: |
          echo "Published branch: gh-pages"
          echo "GitHub Pages URL: https://istominvi.github.io/mihe35/"
          echo "Custom domain: https://mihe35.ru/"
          {
            echo "### Website URLs"
            echo "- GitHub Pages: https://istominvi.github.io/mihe35/"
            echo "- Custom domain: https://mihe35.ru/"
            echo ""
            echo "If either URL shows 404, verify Settings -> Pages -> Source = Deploy from a branch, Branch = gh-pages, Folder = /(root)."
          } >> "$GITHUB_STEP_SUMMARY"
